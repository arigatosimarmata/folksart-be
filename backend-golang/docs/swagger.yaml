definitions:
  dto.EnrollUserRequest:
    properties:
      department:
        type: string
      email:
        type: string
      name:
        type: string
      operator:
        type: string
      role:
        type: string
    required:
    - department
    - email
    - name
    - operator
    - role
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.TokenResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      token_type:
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.UpdateUserRequest:
    properties:
      kyc_status:
        type: string
      mfa_enabled:
        type: boolean
      operator:
        type: string
      risk_score:
        type: integer
      status:
        type: string
    required:
    - operator
    type: object
  dto.UserResponse:
    properties:
      created_at:
        type: string
      department:
        type: string
      email:
        type: string
      id:
        type: string
      kyc_status:
        type: string
      name:
        type: string
      risk_score:
        type: integer
      role:
        type: string
      status:
        type: string
      username:
        type: string
    type: object
  httputil.Response:
    properties:
      code:
        type: string
      data: {}
      message:
        type: string
      meta: {}
    type: object
info:
  contact: {}
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Log in with email and password to receive a JWT access token
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httputil.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.TokenResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httputil.Response'
      summary: Authenticate principal
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Invalidate the current access token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httputil.Response'
      security:
      - ApiKeyAuth: []
      summary: Terminate session
      tags:
      - Auth
  /auth/me:
    get:
      consumes:
      - application/json
      description: Retrieve details of the currently authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httputil.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
      security:
      - ApiKeyAuth: []
      summary: Get current principal info
      tags:
      - Auth
  /users:
    get:
      consumes:
      - application/json
      description: Get a paginated list of users with search and filter options
      parameters:
      - description: Search by name or email
        in: query
        name: search
        type: string
      - description: Filter by role
        in: query
        name: role
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Page size
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httputil.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.UserResponse'
                  type: array
              type: object
      summary: List all users with filtering
      tags:
      - Identity
    post:
      consumes:
      - application/json
      description: Create a new user identity in the system
      parameters:
      - description: User Enrollment Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.EnrollUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/httputil.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httputil.Response'
      security:
      - ApiKeyAuth: []
      summary: Enroll a new principal
      tags:
      - Identity
  /users/{id}:
    delete:
      consumes:
      - application/json
      description: Remove a user from the active directory
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Operator ID
        in: query
        name: operator
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httputil.Response'
      security:
      - ApiKeyAuth: []
      summary: Decommission principal
      tags:
      - Identity
    patch:
      consumes:
      - application/json
      description: Patch specific fields of a user identity
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Update Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httputil.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
      security:
      - ApiKeyAuth: []
      summary: Update principal attributes
      tags:
      - Identity
swagger: "2.0"
